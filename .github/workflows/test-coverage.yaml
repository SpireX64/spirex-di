name: "Test & Coverage"

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - '**'
              - '!packages/**'
            di:
              - 'packages/di/**'
            di-dynamic:
              - 'packages/di-dynamic/**'
            di-config:
              - 'packages/di-config/**'
            di-react:
              - 'packages/di-react/**'
            di-solid:
              - 'packages/di-solid/**'
            di-svelte:
              - 'packages/di-svelte/**'
            di-angular-bridge:
              - 'packages/di-angular-bridge/**'

      - id: matrix
        env:
          SHARED: ${{ steps.filter.outputs.shared }}
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          ALL='["di","di-dynamic","di-config","di-react","di-solid","di-svelte","di-angular-bridge"]'
          if [ "$SHARED" = "true" ]; then
            echo "packages=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILTERED=$(echo "$CHANGES" | jq -c 'map(select(. == "di" or . == "di-dynamic" or . == "di-config" or . == "di-react" or . == "di-solid" or . == "di-svelte" or . == "di-angular-bridge"))')
          COUNT=$(echo "$FILTERED" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "packages=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "packages=$FILTERED" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Node.JS"
        uses: actions/setup-node@v4
        with:
          node-version: "22.22"
          cache: "yarn"

      - name: "Install Dependencies"
        run: yarn install --frozen-lockfile

      - name: "Build Package"
        run: |
          # Build core package
          if [ "${{ matrix.package }}" != "di" ]; then
            echo "Building core @spirex/di..."
            yarn workspace @spirex/di build:release
          fi

          # Build current package
          echo "Building @spirex/${{ matrix.package }}..."
          yarn workspace @spirex/${{ matrix.package }} build:release

      - name: "Run Tests"
        run: |
          yarn workspace @spirex/${{ matrix.package }} test:c
          sed -i.bak "s|^SF:|SF:packages/${{ matrix.package }}/src/|g" packages/${{ matrix.package }}/coverage/lcov.info

      - name: "Upload Coverage"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage/lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: ${{ matrix.package }}
          files: packages/${{ matrix.package }}/coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
